<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>GoalStream Live</title>
    
    <!-- Script for external configuration -->
    <script src="/stream-config.js"></script>

    <!-- Ad Scripts -->
    <script>
        (function() {
            var cfg = window.__GOALSTREAM_CONFIG__;
            if (!cfg || !cfg.ads) return;
            // Pop-Under
            if (cfg.ads.popunder_url) {
                var s1 = document.createElement('script');
                s1.src = cfg.ads.popunder_url;
                document.head.appendChild(s1);
            }
            // Monetag Push
            if (cfg.ads.monetag_url) {
                var s2 = document.createElement('script');
                s2.src = cfg.ads.monetag_url;
                document.head.appendChild(s2);
            }
        })();
    </script>
  </head>
  <body class="bg-neutral-950">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
